name: Rebuild web/dist on main

# After a PR merges to main, rebuild the SPA bundle and commit it back so the
# embedded web/dist (consumed by go:embed in internal/websrv) never drifts from
# web/src. The PR-time CI job (ci.yml → web) emits a warning when dist is stale
# on a pull request; this workflow is the one that actually fixes it.
#
# Only runs when source-side files change, so the bot's own commits (which only
# touch web/dist/) do not retrigger the workflow.

on:
  push:
    branches: [main, master]
    paths:
      - 'web/src/**'
      - 'web/index.html'
      - 'web/package.json'
      - 'web/package-lock.json'
      - 'web/tsconfig.json'
      - 'web/tsconfig.node.json'
      - 'web/vite.config.ts'

permissions:
  contents: write

concurrency:
  group: rebuild-web-dist-${{ github.ref }}
  cancel-in-progress: false

jobs:
  rebuild:
    name: Rebuild & commit web/dist
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: npm ci
        working-directory: web
        run: npm ci

      - name: Build SPA
        working-directory: web
        run: npm run build

      - name: Commit rebuilt dist (if changed)
        run: |
          if git diff --quiet -- web/dist; then
            echo "web/dist is already up to date."
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add web/dist
          git commit -m "chore(web): rebuild dist [skip ci]"
          git push
