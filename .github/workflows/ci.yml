name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  go:
    name: Go (build, vet, test)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify go.mod / go.sum are tidy
        run: |
          go mod tidy
          if ! git diff --quiet -- go.mod go.sum; then
            echo "::error::go.mod / go.sum are not tidy. Run 'go mod tidy' and commit."
            git --no-pager diff -- go.mod go.sum
            exit 1
          fi

      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "::error::The following files are not gofmt-clean:"
            echo "$out"
            echo "--- diff ---"
            gofmt -d .
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test (race)
        run: go test -race -count=1 ./...

  web:
    name: Web (typecheck, build)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: npm ci
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build SPA
        run: npm run build

      - name: Flag stale web/dist on PRs
        if: github.event_name == 'pull_request'
        run: |
          if git diff --quiet -- dist; then
            echo "web/dist matches web/src — no action needed."
            exit 0
          fi
          echo "::warning::web/dist is out of sync with web/src. The post-merge job on main will rebuild and commit it automatically, but you can rebuild locally (npm --prefix web run build) and amend the PR to skip the bot follow-up commit."
          git --no-pager diff --stat -- dist
